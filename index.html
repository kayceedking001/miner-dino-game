<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miner Dino</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #0a0f1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Arial, sans-serif; }
        .game-container { position: relative; width: 100%; max-width: 100%; background: #1a1f2e; }
        canvas { display: block; width: 100%; height: 100vh; background: #2a3145; cursor: pointer; touch-action: none; }
        #ui-overlay { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 10; }
        .score { background: rgba(0,0,0,0.7); padding: 15px 25px; border-radius: 30px; border: 2px solid #ffd966; color: #ffd966; font-size: 28px; font-weight: bold; }
        .game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); padding: 40px; border-radius: 30px; border: 3px solid #ffd966; text-align: center; display: none; z-index: 20; width: 80%; max-width: 400px; }
        .game-over h2 { color: #ffd966; font-size: 48px; margin-bottom: 20px; }
        .game-over .final-score { color: #4aff4a; font-size: 64px; margin: 20px 0; }
        .game-over button { background: #4a9eff; color: white; border: none; padding: 20px 40px; font-size: 28px; border-radius: 15px; cursor: pointer; width: 100%; }
        .start-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 15; width: 100%; }
        .start-screen h1 { color: #ffd966; font-size: 72px; margin-bottom: 30px; }
        .start-screen button { background: #4a9eff; color: white; border: none; padding: 25px 50px; font-size: 36px; border-radius: 20px; cursor: pointer; }
        .start-screen .hint { color: #fff; margin-top: 30px; font-size: 24px; }
    </style>
</head>
<body>
    <div class="game-container">
        <div id="ui-overlay">
            <div class="score" id="scoreDisplay">0</div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div class="start-screen" id="startScreen">
            <h1>MINER DINO</h1>
            <button id="startButton">▶ PLAY</button>
            <div class="hint">⬆️ TAP TO JUMP</div>
        </div>
        
        <div class="game-over" id="gameOverScreen">
            <h2>GAME OVER</h2>
            <div class="final-score" id="finalScore">0</div>
            <button id="restartButton">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // ============================================
        // TELEGRAM WEB APP - FIXED VERSION
        // ============================================
        let tg = null;
        let telegramReady = false;
        
        // Check if Telegram Web App is available (standard way)
        if (window.Telegram?.WebApp) {
            tg = window.Telegram.WebApp;
            console.log("✅ Telegram WebApp found");
            
            try {
                tg.ready();
                tg.expand();
                telegramReady = true;
                console.log("✅ Telegram initialized");
                console.log("📱 Platform:", tg.platform || "unknown");
                console.log("👤 User:", tg.initDataUnsafe?.user?.id || "unknown");
            } catch (e) {
                console.error("❌ Telegram init error:", e);
            }
        } else {
            console.log("⚠️ Telegram.WebApp not found");
            
            // Check URL hash for Telegram data (debug only)
            if (window.location.hash.includes('tgWebAppData')) {
                console.log("✅ Telegram data found in URL hash");
                // Force reload to initialize Telegram
                window.location.reload();
            }
        }

        // ============================================
        // CANVAS SETUP
        // ============================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Make canvas fill the screen
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // UI Elements
        const scoreDisplay = document.getElementById('scoreDisplay');
        const finalScore = document.getElementById('finalScore');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');

        // ============================================
        // GAME VARIABLES
        // ============================================
        let gameRunning = false;
        let score = 0;
        
        // Player
        let player = {
            x: 100,
            y: 300,
            width: 40,
            height: 60,
            vy: 0,
            grounded: true
        };
        
        // Obstacles
        let obstacles = [];
        
        // Timing
        let frameCount = 0;
        let spawnTimer = 60;
        
        // Constants
        const GROUND_Y = canvas.height - 100;
        const GRAVITY = 0.8;
        const JUMP_FORCE = -15;
        const OBSTACLE_SPEED = 5;
        const MIN_SPAWN_TIME = 80;
        const MAX_SPAWN_TIME = 120;

        // ============================================
        // GAME FUNCTIONS
        // ============================================
        function startGame() {
            gameRunning = true;
            score = 0;
            player.y = GROUND_Y - player.height;
            player.vy = 0;
            obstacles = [];
            frameCount = 0;
            spawnTimer = 60;
            
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            scoreDisplay.innerText = '0';
        }

        function jump() {
            if (!gameRunning) return;
            if (player.grounded) {
                player.vy = JUMP_FORCE;
                player.grounded = false;
            }
        }

        function spawnObstacle() {
            const height = 40 + Math.floor(Math.random() * 20);
            obstacles.push({
                x: canvas.width,
                y: GROUND_Y - height,
                width: 25,
                height: height,
                passed: false
            });
        }

        // ============================================
        // UPDATE
        // ============================================
        function update() {
            if (!gameRunning) return;
            
            frameCount++;
            
            // Player physics
            player.vy += GRAVITY;
            player.y += player.vy;
            
            if (player.y >= GROUND_Y - player.height) {
                player.y = GROUND_Y - player.height;
                player.vy = 0;
                player.grounded = true;
            }
            
            // Spawn obstacles
            if (frameCount > spawnTimer) {
                spawnObstacle();
                spawnTimer = frameCount + MIN_SPAWN_TIME + Math.floor(Math.random() * (MAX_SPAWN_TIME - MIN_SPAWN_TIME));
            }
            
            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= OBSTACLE_SPEED;
                
                if (!obstacles[i].passed && obstacles[i].x + obstacles[i].width < player.x) {
                    obstacles[i].passed = true;
                    score += 10;
                    scoreDisplay.innerText = score;
                }
                
                if (!obstacles[i].passed &&
                    player.x < obstacles[i].x + obstacles[i].width &&
                    player.x + player.width > obstacles[i].x &&
                    player.y < obstacles[i].y + obstacles[i].height &&
                    player.y + player.height > obstacles[i].y) {
                    gameOver();
                    return;
                }
                
                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                }
            }
        }

        function gameOver() {
            gameRunning = false;
            finalScore.innerText = score;
            gameOverScreen.style.display = 'block';
            
            console.log("🎮 Game Over! Score:", score);
            console.log("📱 Telegram ready?", telegramReady);
            
            // Send score to Telegram bot
            if (telegramReady && tg) {
                try {
                    const data = JSON.stringify({
                        action: 'game_complete',
                        score: score
                    });
                    
                    console.log("📤 Sending to bot:", data);
                    tg.sendData(data);
                    console.log("✅ Data sent successfully");
                    
                    // Show confirmation
                    alert(`✅ Score ${score} sent to bot!`);
                } catch (e) {
                    console.error("❌ Failed to send:", e);
                }
            } else {
                console.log("⚠️ Not in Telegram - score not sent");
                alert("⚠️ Playing in browser mode\nScore will not be saved.\nOpen in Telegram to earn points!");
            }
        }

        // ============================================
        // DRAW
        // ============================================
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Sky
            ctx.fillStyle = '#2a3f5e';
            ctx.fillRect(0, 0, canvas.width, GROUND_Y);
            
            // Ground
            ctx.fillStyle = '#4a4a6a';
            ctx.fillRect(0, GROUND_Y, canvas.width, 10);
            
            // Ground line
            ctx.fillStyle = '#ffd966';
            ctx.fillRect(0, GROUND_Y, canvas.width, 2);
            
            // Obstacles
            for (let obs of obstacles) {
                ctx.fillStyle = '#ff4a4a';
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            }
            
            // Player
            ctx.fillStyle = '#4a9eff';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            // Head
            ctx.fillStyle = '#6aaaff';
            ctx.fillRect(player.x + player.width, player.y - 5, 15, 15);
            
            // Eye
            ctx.fillStyle = 'white';
            ctx.fillRect(player.x + player.width + 8, player.y - 2, 3, 3);
            
            // Pickaxe
            if (player.grounded) {
                ctx.fillStyle = '#888888';
                ctx.fillRect(player.x - 15, player.y + 15, 20, 5);
                ctx.fillRect(player.x - 20, player.y + 10, 5, 15);
            }
            
            // Score
            ctx.fillStyle = '#ffd966';
            ctx.font = 'bold 24px Arial';
            ctx.fillText(`Score: ${score}`, 20, 50);
            
            // Telegram status
            if (telegramReady) {
                ctx.fillStyle = '#4aff4a';
                ctx.font = '16px Arial';
                ctx.fillText('✅ Telegram Connected', canvas.width - 200, 50);
            } else {
                ctx.fillStyle = '#ff6b6b';
                ctx.font = '16px Arial';
                ctx.fillText('❌ Browser Mode', canvas.width - 180, 50);
            }
        }

        // ============================================
        // GAME LOOP
        // ============================================
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        function handleJump(e) {
            e.preventDefault();
            jump();
            return false;
        }

        // Touch events
        canvas.addEventListener('touchstart', handleJump, { passive: false });
        canvas.addEventListener('touchend', (e) => e.preventDefault());
        
        // Mouse click
        canvas.addEventListener('mousedown', handleJump);
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());

        // Buttons
        document.getElementById('startButton').addEventListener('click', startGame);
        document.getElementById('restartButton').addEventListener('click', startGame);

        // Window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // ============================================
        // START
        // ============================================
        console.log("🎮 Game loaded. Telegram ready:", telegramReady);
        gameLoop();
    </script>
</body>
</html>
