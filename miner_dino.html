    <script>
        // ============================================
        // TELEGRAM WEB APP - FIXED VERSION
        // ============================================
        const tg = window.Telegram?.WebApp;
        
        // Initialize Telegram Web App
        if (tg) {
            tg.ready();
            tg.expand(); // Make it fullscreen
            tg.enableClosingConfirmation(); // Ask before closing
            console.log("Telegram Web App initialized");
        }

        // ============================================
        // CANVAS SETUP
        // ============================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // UI Elements
        const scoreDisplay = document.getElementById('scoreDisplay');
        const finalScore = document.getElementById('finalScore');
        const obstaclesPassedSpan = document.getElementById('obstaclesPassed');
        const pointsEarnedSpan = document.getElementById('pointsEarned');
        const walletDisplay = document.getElementById('walletDisplay');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const comboDisplay = document.getElementById('comboDisplay');

        // ============================================
        // GAME VARIABLES
        // ============================================
        let gameRunning = false;
        let score = 0;
        let obstaclesPassed = 0;
        let combo = 0;
        let comboTimeout;
        
        // Player
        let player = {
            x: 100,
            y: 250,
            width: 30,
            height: 50,
            vy: 0,
            grounded: true
        };
        
        // Obstacles
        let obstacles = [];
        
        // Constants
        const GROUND_Y = 300;
        const GRAVITY = 0.8;
        const JUMP_FORCE = -15;
        
        // Frame counter
        let frameCount = 0;
        let spawnTimer = 30;
        
        // Wallet
        let walletConnected = false;

        // ============================================
        // CHECK WALLET FROM TELEGRAM
        // ============================================
        if (tg) {
            // You can pass wallet status from your bot via initData
            // For now, we'll keep it as is
            console.log("Telegram user:", tg.initDataUnsafe?.user);
        }

        // ============================================
        // RESIZE FOR MOBILE
        // ============================================
        function resizeCanvas() {
            const container = document.querySelector('.game-container');
            const containerWidth = container.clientWidth - 40; // Account for padding
            
            // Set canvas size based on container
            canvas.style.width = containerWidth + 'px';
            canvas.style.height = 'auto';
            
            // Maintain aspect ratio
            const aspectRatio = 800/400;
            canvas.height = containerWidth / aspectRatio;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ============================================
        // GAME FUNCTIONS
        // ============================================
        function startGame() {
            gameRunning = true;
            score = 0;
            obstaclesPassed = 0;
            combo = 0;
            player.y = GROUND_Y - player.height;
            player.vy = 0;
            obstacles = [];
            frameCount = 0;
            spawnTimer = 30;
            
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            updateScore();
        }

        function jump() {
            if (!gameRunning) return;
            if (player.grounded) {
                player.vy = JUMP_FORCE;
                player.grounded = false;
            }
        }

        function spawnObstacle() {
            const height = 35 + Math.floor(Math.random() * 25);
            obstacles.push({
                x: canvas.width,
                y: GROUND_Y - height,
                width: 18,
                height: height,
                passed: false
            });
        }

        function showCombo() {
            if (combo >= 2) {
                comboDisplay.style.display = 'block';
                comboDisplay.innerText = `${combo}x COMBO!`;
                setTimeout(() => {
                    comboDisplay.style.display = 'none';
                }, 500);
            }
        }

        function updateScore() {
            scoreDisplay.innerText = score;
        }

        function calculatePoints() {
            let points = obstaclesPassed * 10;
            if (combo > 1) points += combo * 5;
            if (walletConnected) points = Math.floor(points * 1.2);
            return points;
        }

        function gameOver() {
            gameRunning = false;
            
            const totalPoints = calculatePoints();
            
            finalScore.innerText = totalPoints;
            obstaclesPassedSpan.innerText = obstaclesPassed;
            pointsEarnedSpan.innerText = totalPoints;
            
            gameOverScreen.style.display = 'block';
            
            // Send to Telegram bot - FIXED VERSION
            if (tg) {
                const gameData = {
                    action: 'game_complete',
                    score: totalPoints,
                    obstacles: obstaclesPassed,
                    combo: combo,
                    walletConnected: walletConnected
                };
                
                console.log("Sending to bot:", gameData);
                tg.sendData(JSON.stringify(gameData));
                tg.close(); // Optional: close after sending
            }
        }

        // ============================================
        // UPDATE
        // ============================================
        function update() {
            if (!gameRunning) return;
            
            frameCount++;
            
            // Player physics
            player.vy += GRAVITY;
            player.y += player.vy;
            
            if (player.y >= GROUND_Y - player.height) {
                player.y = GROUND_Y - player.height;
                player.vy = 0;
                player.grounded = true;
            }
            
            // Spawn obstacles
            if (frameCount > spawnTimer) {
                spawnObstacle();
                spawnTimer = frameCount + 40 + Math.floor(Math.random() * 40);
            }
            
            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.x -= 6;
                
                if (!obs.passed && obs.x + obs.width < player.x) {
                    obs.passed = true;
                    obstaclesPassed++;
                    
                    combo++;
                    clearTimeout(comboTimeout);
                    comboTimeout = setTimeout(() => { combo = 0; }, 1000);
                    
                    showCombo();
                    score += 10;
                    updateScore();
                }
                
                if (!obs.passed &&
                    player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y) {
                    
                    if (walletConnected && combo > 0) {
                        combo--;
                        obstacles.splice(i, 1);
                        continue;
                    }
                    
                    gameOver();
                    return;
                }
                
                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                }
            }
            
            if (frameCount % 10 === 0) {
                score += 1;
                updateScore();
            }
        }

        // ============================================
        // DRAW - ADJUSTED FOR MOBILE
        // ============================================
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Sky
            ctx.fillStyle = '#2a3f5e';
            ctx.fillRect(0, 0, canvas.width, GROUND_Y);
            
            // Ground
            ctx.fillStyle = '#4a4a6a';
            ctx.fillRect(0, GROUND_Y, canvas.width, 5);
            ctx.fillStyle = '#ffd966';
            ctx.fillRect(0, GROUND_Y, canvas.width, 2);
            
            // Obstacles
            for (let obs of obstacles) {
                ctx.fillStyle = '#6a8a4a';
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            }
            
            // Player
            ctx.fillStyle = '#4a9eff';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            // Head
            ctx.fillStyle = '#6aaaff';
            ctx.fillRect(player.x + player.width, player.y - 5, 15, 15);
            
            // Eye
            ctx.fillStyle = 'white';
            ctx.fillRect(player.x + player.width + 10, player.y - 2, 3, 3);
            
            // Pickaxe
            if (player.grounded) {
                ctx.fillStyle = '#888888';
                ctx.fillRect(player.x - 15, player.y + 10, 20, 5);
                ctx.fillRect(player.x - 20, player.y + 5, 5, 15);
            }
            
            // Wallet indicator
            if (walletConnected) {
                ctx.fillStyle = '#4aff4a';
                ctx.font = '20px Arial';
                ctx.fillText('🔗', player.x - 30, player.y - 20);
            }
            
            // Combo
            if (combo > 1) {
                ctx.fillStyle = '#ffd966';
                ctx.font = 'bold 24px Arial';
                ctx.fillText(`${combo}x COMBO!`, 20, 80);
            }
        }

        // ============================================
        // GAME LOOP
        // ============================================
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ============================================
        // EVENT LISTENERS - FIXED FOR TOUCH
        // ============================================
        function handleJump(e) {
            e.preventDefault();
            e.stopPropagation();
            jump();
            return false;
        }

        // Keyboard
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                jump();
            }
        });

        // Touch events for mobile - improved
        canvas.addEventListener('touchstart', handleJump, { passive: false });
        canvas.addEventListener('touchend', (e) => e.preventDefault(), { passive: false });
        canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        
        // Mouse click for desktop
        canvas.addEventListener('mousedown', handleJump);
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());

        document.getElementById('startButton').addEventListener('click', startGame);
        document.getElementById('restartButton').addEventListener('click', startGame);

        // ============================================
        // START
        // ============================================
        gameLoop();
    </script>
